<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ROMA MODA STYLE | دبي</title>
</head>
<body>

    <header>
        <h1 class="brand-name">ROMA MODA STYLE</h1>
        <p class="tagline">LUXURY SHOES & HANDBAGS - UAE</p>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>موسم الأناقة:<br>اكتشفي تشكيلتنا الجديدة</h2>
            <button class="btn-gold">تسوقي الآن</button>
        </div>
    </section>

    <section class="products-section">
        <h3 class="section-title">أحدث الموديلات</h3>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="image-placeholder">ROMA MODA</div>
                <h4>حقيبة فاخرة (قريباً)</h4>
                <p class="price">950 درهم إماراتي</p>
                <button class="add-btn">أضف للسلة</button>
            </div>

            <div class="product-card">
                <div class="image-placeholder">ROMA MODA</div>
                <h4>حذاء ملكي (قريباً)</h4>
                <p class="price">750 درهم إماراتي</p>
                <button class="add-btn">أضف للسلة</button>
            </div>

        </div>
    </section>

</body>
</html>
