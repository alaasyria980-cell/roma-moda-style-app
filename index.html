<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMA MODA STYLE | دبي</title>
    <style>
        :root { --gold: #b8860b; --bg: #fdfaf6; --dark: #1a1a1a; }
        body { font-family: 'Times New Roman', serif; margin: 0; background: var(--bg); color: var(--dark); line-height: 1.6; }
        .promo-bar { background: var(--gold); color: white; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; }
        header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { font-size: 2.5rem; letter-spacing: 5px; margin: 0; }
        nav { background: white; padding: 10px; border-bottom: 1px solid var(--gold); display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        nav a { text-decoration: none; color: var(--dark); font-size: 14px; font-weight: bold; }
        
        .main-grid { padding: 40px 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: white; padding: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .product-card img { width: 100%; height: 350px; object-fit: contain; margin-bottom: 15px; background: #fff; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        .buy-btn { background: var(--gold); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="promo-bar">شحن مجاني داخل الإمارات على الطلبيات فوق 300 درهم - ROMA MODA STYLE</div>

    <header>
        <h1 class="logo">ROMA MODA STYLE</h1>
        <p style="color:var(--gold); margin:5px 0; font-size:12px;">LUXURY HANDBAGS - UAE</p>
    </header>

    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">حقائب سهرة</a>
        <a href="#">جديدنا</a>
        <a href="#">تواصل معنا</a>
    </nav>

    <section class="main-grid">
        
        <div class="product-card">
            <img src="https://api.clp.api.google.com/api/v1/content/uploaded:1000074459.jpg" alt="حقيبة عنابية">
            <h4>حقيبة يد كلاسيكية فخمة</h4>
            <p class="price">1100 درهم</p>
            <button class="buy-btn">اطلبي الآن</button>
        </div>

        <div class="product-card">
            <img src="https://api.clp.api.google.com/api/v1/content/uploaded:1000074461.jpg" alt="حقيبة لؤلؤ">
            <h4>حقيبة سهرة مرصعة باللؤلؤ</h4>
            <p class="price">1250 درهم</p>
            <button class="buy-btn">اطلبي الآن</button>
        </div>

        <div class="product-card">
            <img src="https://api.clp.api.google.com/api/v1/content/uploaded:1000074463.jpg" alt="حقيبة سوداء مرصعة">
            <h4>كلاتش سهرة أسود ملكي</h4>
            <p class="price">950 درهم</p>
            <button class="buy-btn">اطلبي الآن</button>
        </div>

        <div class="product-card">
            <img src="https://api.clp.api.google.com/api/v1/content/uploaded:1000074465.jpg" alt="حقيبة ذهبية مرصعة">
            <h4>كلاتش ذهبي مرصع بالألماس</h4>
            <p class="price">1050 درهم</p>
            <button class="buy-btn">اطلبي الآن</button>
        </div>

    </section>

</body>
</html>
