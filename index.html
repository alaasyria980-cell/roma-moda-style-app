<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <title>ROMA MODA STYLE | عالم الأناقة</title>
</head>
<body>

    <header>
        <h1 class="brand-name">ROMA MODA STYLE</h1>
        <p style="letter-spacing: 3px; font-size: 12px; color: #888;">LUXURY SHOES & HANDBAGS</p>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>موسم الأناقة:<br>اكتشفي تشكيلتنا الجديدة</h2>
            <button class="btn-gold">تسوقي الآن</button>
        </div>
    </section>

    <section class="products-section">
        <h3 style="text-align: center; margin-bottom: 40px; font-size: 2rem;">أحدث الموديلات</h3>
        <div class="product-grid">
            
            <div class="product-card">
                <img src="images/bag1.jpg" alt="حقيبة فاخرة">
                <h4>حقيبة روما الملكية</h4>
                <p class="price">950 درهم إماراتي</p>
                <button style="width: 100%; padding: 10px; background: none; border: 1px solid #b8860b; color: #b8860b;">أضف للسلة</button>
            </div>

            <div class="product-card">
                <img src="images/shoes1.jpg" alt="حذاء فاخر">
                <h4>حذاء كعب ذهبي مرصع</h4>
                <p class="price">750 درهم إماراتي</p>
                <button style="width: 100%; padding: 10px; background: none; border: 1px solid #b8860b; color: #b8860b;">أضف للسلة</button>
            </div>

        </div>
    </section>

</body>
</html>
